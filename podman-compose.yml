services:
  acc-sql-identity:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: acc-sql-identity
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL_PASSWORD}
    volumes:
      - sql_identity_data:/var/opt/mssql
    networks:
      - acc-internal
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -C || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\""]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

  acc-sql-academic:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: acc-sql-academic
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL_PASSWORD}
    volumes:
      - sql_academic_data:/var/opt/mssql
    networks:
      - acc-internal
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -C || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\""]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

  acc-redis:
    image: redis:7-alpine
    container_name: acc-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - acc-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 20

  acc-migrate-academic:
    build:
      context: .
      dockerfile: src/ACC.API/Containerfile
    image: acc-api:latest
    container_name: acc-migrate-academic
    restart: "no"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Network__TlsTerminatedAtProxy: "true"
      Database__ApplyMigrationsOnStartup: "true"
      Database__MigrateOnly: "true"
      SqlPassword: ${SQL_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Key: ${JWT_KEY}
      ServiceEndpoints__ApiBaseUrl: http://acc-api:8080/api/
      ServiceEndpoints__CompilerBaseUrl: http://acc-compiler:8080/
      ServiceEndpoints__WebAppBaseUrl: http://acc-webapp:8080/
      ConnectionStrings__acc-academic-db: Server=acc-sql-academic,1433;User ID=sa;Password=${SQL_PASSWORD};TrustServerCertificate=true;Initial Catalog=ACC_Academic
    networks:
      - acc-internal
    depends_on:
      acc-sql-academic:
        condition: service_healthy

  acc-migrate-identity:
    build:
      context: .
      dockerfile: ACC.WebApp/ACC.WebApp/Containerfile
    image: acc-webapp:latest
    container_name: acc-migrate-identity
    restart: "no"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Network__TlsTerminatedAtProxy: "true"
      Database__ApplyMigrationsOnStartup: "true"
      Database__MigrateOnly: "true"
      SqlPassword: ${SQL_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Key: ${JWT_KEY}
      ServiceEndpoints__ApiBaseUrl: http://acc-api:8080/api/
      ServiceEndpoints__CompilerBaseUrl: http://acc-compiler:8080/
      ServiceEndpoints__WebAppBaseUrl: http://acc-webapp:8080/
      ConnectionStrings__acc-identity-db: Server=acc-sql-identity,1433;User ID=sa;Password=${SQL_PASSWORD};TrustServerCertificate=true;Initial Catalog=ACC_Identity
    networks:
      - acc-internal
    depends_on:
      acc-sql-identity:
        condition: service_healthy

  acc-compiler:
    build:
      context: .
      dockerfile: src/API_CompilerACC/Containerfile
    image: acc-compiler:latest
    container_name: acc-compiler
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Network__TlsTerminatedAtProxy: "true"
    networks:
      - acc-internal
    depends_on:
      acc-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/alive || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  acc-api:
    build:
      context: .
      dockerfile: src/ACC.API/Containerfile
    image: acc-api:latest
    container_name: acc-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Network__TlsTerminatedAtProxy: "true"
      SqlPassword: ${SQL_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Key: ${JWT_KEY}
      ServiceEndpoints__ApiBaseUrl: http://acc-api:8080/api/
      ServiceEndpoints__CompilerBaseUrl: http://acc-compiler:8080/
      ServiceEndpoints__WebAppBaseUrl: http://acc-webapp:8080/
      ConnectionStrings__acc-academic-db: Server=acc-sql-academic,1433;User ID=sa;Password=${SQL_PASSWORD};TrustServerCertificate=true;Initial Catalog=ACC_Academic
      ConnectionStrings__acc-redis: acc-redis:6379
    networks:
      - acc-internal
    depends_on:
      acc-sql-academic:
        condition: service_healthy
      acc-migrate-academic:
        condition: service_completed_successfully
      acc-redis:
        condition: service_healthy
      acc-compiler:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/alive || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  acc-webapp:
    build:
      context: .
      dockerfile: ACC.WebApp/ACC.WebApp/Containerfile
    image: acc-webapp:latest
    container_name: acc-webapp
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Network__TlsTerminatedAtProxy: "true"
      SqlPassword: ${SQL_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Key: ${JWT_KEY}
      ServiceEndpoints__ApiBaseUrl: http://acc-api:8080/api/
      ServiceEndpoints__CompilerBaseUrl: http://acc-compiler:8080/
      ServiceEndpoints__WebAppBaseUrl: http://acc-webapp:8080/
      ConnectionStrings__acc-identity-db: Server=acc-sql-identity,1433;User ID=sa;Password=${SQL_PASSWORD};TrustServerCertificate=true;Initial Catalog=ACC_Identity
      ConnectionStrings__acc-redis: acc-redis:6379
    ports:
      - "${WEBAPP_HTTP_PORT:-8080}:8080"
    networks:
      - acc-internal
    depends_on:
      acc-sql-identity:
        condition: service_healthy
      acc-migrate-identity:
        condition: service_completed_successfully
      acc-redis:
        condition: service_healthy
      acc-api:
        condition: service_healthy
      acc-compiler:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/alive || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

networks:
  acc-internal:
    name: acc-internal

volumes:
  sql_identity_data:
    name: acc-sql-identity-data
  sql_academic_data:
    name: acc-sql-academic-data
  redis_data:
    name: acc-redis-data
